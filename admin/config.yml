backend:
  name: github
  repo: ModEnter/viluma
  branch: main

# Pour activer l'authentification, creer une GitHub OAuth App :
# 1. Aller sur https://github.com/settings/developers
# 2. Creer une nouvelle OAuth App
# 3. Homepage URL : https://viluma-kinesitherapie.com
# 4. Callback URL : https://api.netlify.com/auth/done
# 5. Copier le Client ID et le Client Secret
# 6. Connecter le site a Netlify OU utiliser un OAuth proxy

publish_mode: editorial_workflow

media_folder: "images/blog"
public_folder: "/images/blog"

locale: "fr"

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "posts"
    label: "Articles"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Publiés"
        field: published
        pattern: true
      - label: "Brouillons"
        field: published
        pattern: false
      - label: "À la une"
        field: featured
        pattern: true
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Titre"
        name: "title"
        widget: "string"
        hint: "Le titre principal de l'article"

      - label: "Date de publication"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: "Auteur"
        name: "author"
        widget: "select"
        options:
          - "Sarah Maréchal"
          - "Maroua Soussi"
        default: "Sarah Maréchal"

      - label: "Image de couverture"
        name: "image"
        widget: "image"
        required: false
        hint: "Format recommandé : 1200x630px (16:9)"

      - label: "Description courte"
        name: "excerpt"
        widget: "text"
        hint: "2-3 phrases résumant l'article. Apparaît sur la carte blog."

      - label: "Catégories"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - label: "Kinésithérapie"
            value: "kinesitherapie"
          - label: "Ostéopathie"
            value: "osteopathie"
          - label: "Sport"
            value: "sport"
          - label: "Prévention"
            value: "prevention"
          - label: "Seniors"
            value: "seniors"
          - label: "Post-opératoire"
            value: "post-operatoire"
          - label: "Actualités"
            value: "actualites"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Mots-clés séparés par des virgules"

      - label: "Titre SEO"
        name: "seo_title"
        widget: "string"
        required: false
        hint: "Max 60 caractères. Si vide, le titre principal est utilisé."

      - label: "Meta description"
        name: "meta_description"
        widget: "text"
        required: false
        hint: "Max 160 caractères. Description pour Google."

      - label: "Image OG (réseaux sociaux)"
        name: "og_image"
        widget: "image"
        required: false
        hint: "Image pour le partage social. Si vide, l'image de couverture est utilisée."

      - label: "À la une"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Affiche l'article en grand sur la page blog"

      - label: "Publié"
        name: "published"
        widget: "boolean"
        default: true
        hint: "Décocher pour enregistrer comme brouillon"

      - label: "Contenu"
        name: "body"
        widget: "markdown"
